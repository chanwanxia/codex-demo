<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>今日待办</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ff6b35 0%, #f7c59f 50%, #ef476f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      color: #333;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .subtitle {
      color: #ff6b35;
      font-size: 12px;
      margin-top: 4px;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    #todoInput {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #ffd4b8;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #todoInput:focus { border-color: #ff6b35; }
    #addBtn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #ff6b35, #ef476f);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(239, 71, 111, 0.3);
    }
    #addBtn:hover { 
      box-shadow: 0 6px 16px rgba(239, 71, 111, 0.4);
      transform: translateY(-1px);
    }
    #addBtn:active { transform: translateY(0); }
    .todo-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 14px;
      background: linear-gradient(135deg, #fff9f6, #fff);
      border: 1px solid #ffe8d9;
      border-radius: 10px;
      margin-bottom: 10px;
      gap: 12px;
      transition: all 0.2s;
    }
    .todo-item:hover {
      border-color: #ff6b35;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.1);
    }
    .todo-item.completed {
      background: #f8f9fa;
      border-color: #e0e0e0;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }
    .todo-checkbox {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: #ff6b35;
    }
    .todo-text {
      flex: 1;
      color: #333;
      font-size: 14px;
      word-break: break-word;
    }
    .delete-btn {
      background: #fff0f0;
      color: #ef476f;
      border: 1px solid #ffd4d4;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .delete-btn:hover { 
      background: #ef476f; 
      color: #fff;
      border-color: #ef476f;
    }
    .empty-state {
      text-align: center;
      color: #ccc;
      padding: 30px 20px;
      font-size: 14px;
    }
    .empty-state::before {
      content: "🛒";
      display: block;
      font-size: 32px;
      margin-bottom: 10px;
    }
    .stats {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .stats strong {
      color: #ff6b35;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛍️ 今日待办</h1>
      <div class="subtitle">高效管理您的购物与运营任务</div>
    </div>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="例如：补货运动鞋、设置促销..." />
      <button id="addBtn">＋ 添加</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
    <div class="stats" id="stats"></div>
  </div>

  <script>
    (function() {
      const todoInput = document.getElementById('todoInput');
      const addBtn = document.getElementById('addBtn');
      const todoList = document.getElementById('todoList');
      const stats = document.getElementById('stats');

      let todos = [];
      try {
        const saved = localStorage.getItem('ecommerce-todos');
        todos = saved ? JSON.parse(saved) : [];
      } catch(e) { todos = []; }

      function saveTodos() {
        try {
          localStorage.setItem('ecommerce-todos', JSON.stringify(todos));
        } catch(e) {}
      }

      function renderTodos() {
        todoList.innerHTML = '';
        if (todos.length === 0) {
          todoList.innerHTML = '<li class="empty-state">暂无任务，开始添加吧～</li>';
        } else {
          todos.forEach((todo, idx) => {
            const li = document.createElement('li');
            li.className = 'todo-item' + (todo.completed ? ' completed' : '');
            li.dataset.id = todo.id;
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'todo-checkbox';
            checkbox.checked = todo.completed;
            checkbox.dataset.action = 'toggle';
            checkbox.dataset.id = todo.id;
            
            const span = document.createElement('span');
            span.className = 'todo-text';
            span.textContent = todo.text;
            
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '删除';
            delBtn.dataset.action = 'delete';
            delBtn.dataset.id = todo.id;
            
            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(delBtn);
            todoList.appendChild(li);
          });
        }
        updateStats();
      }

      function updateStats() {
        const total = todos.length;
        const completed = todos.filter(t => t.completed).length;
        if (total > 0) {
          stats.innerHTML = `共 <strong>${total}</strong> 项 · 已完成 <strong>${completed}</strong> 项`;
        } else {
          stats.textContent = '';
        }
      }

      function addTodo() {
        const text = todoInput.value.trim();
        if (!text) return;
        
        const newTodo = {
          id: Date.now().toString(),
          text: text,
          completed: false,
          createdAt: new Date().toISOString()
        };
        
        todos.unshift(newTodo);
        saveTodos();
        renderTodos();
        todoInput.value = '';
        todoInput.focus();
      }

      function handleListClick(e) {
        const action = e.target.dataset.action;
        const id = e.target.dataset.id;
        if (!action || !id) return;
        
        const idx = todos.findIndex(t => t.id === id);
        if (idx === -1) return;
        
        if (action === 'delete') {
          todos.splice(idx, 1);
          saveTodos();
          renderTodos();
        } else if (action === 'toggle') {
          todos[idx].completed = e.target.checked;
          saveTodos();
          renderTodos();
        }
      }

      // 绑定事件
      addBtn.addEventListener('click', addTodo);
      
      todoInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          addTodo();
        }
      });
      
      todoList.addEventListener('click', handleListClick);

      // 初始化
      renderTodos();
      todoInput.focus();
    })();
  </script>
</body>
</html>
